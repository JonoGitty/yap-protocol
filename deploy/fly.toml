# Fly.io deployment config for Yap tree
# Deploy with: fly deploy --config deploy/fly.toml --dockerfile deploy/Dockerfile

app = "yap-tree"
primary_region = "lhr"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  NODE_ENV = "production"
  YAP_PORT = "8789"
  YAP_API_PORT = "8790"
  YAP_DATA_DIR = "/data"

[mounts]
  source = "yap_data"
  destination = "/data"

[[services]]
  internal_port = 8789
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 2000
    soft_limit = 1000

[checks]
  [checks.health]
    type = "http"
    port = 8790
    path = "/info"
    interval = "30s"
    timeout = "5s"
