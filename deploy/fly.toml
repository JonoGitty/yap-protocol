# Fly.io config — single port for WebSocket + HTTP API
app = "yap-tree"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  YAP_PORT = "8789"
  YAP_DATA_DIR = "/data"

[mounts]
  source = "yap_data"
  destination = "/data"

[http_service]
  internal_port = 8789
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true

[checks]
  [checks.health]
    type = "http"
    port = 8789
    path = "/health"
    interval = "30s"
    timeout = "5s"
